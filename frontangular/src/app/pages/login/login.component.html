<div class="login-wrapper">
  <div class="card login-card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:48px;height:48px;background:var(--color-primario);border-radius:12px;
                  display:flex;align-items:center;justify-content:center;font-size:22px;
                  margin:0 auto 12px">🚗</div>
      <h1 style="font-size:1.4rem;font-weight:700;letter-spacing:-0.02em">Lavadero</h1>
      <p style="font-size:0.85rem;color:var(--color-texto-suave);margin-top:3px">Ingresá a tu cuenta</p>
    </div>

    @if (error) {
      <div class="alerta-error">{{ error }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="form-grupo">
        <label class="form-label">Email</label>
        <input
          class="form-input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@lavadero.com"
          required
          autocomplete="email"
        />
      </div>
      <div class="form-grupo">
        <label class="form-label">Contraseña</label>
        <input
          class="form-input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>
      <button
        class="btn btn-primario"
        type="submit"
        [disabled]="cargando"
        style="width:100%;justify-content:center;margin-top:4px;padding:10px"
      >
        {{ cargando ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:0.85rem;color:var(--color-texto-suave)">
      ¿Tu lavadero no está registrado?
      <a routerLink="/registro" style="color:var(--color-primario);font-weight:600">Registralo acá</a>
    </p>
  </div>
</div>
